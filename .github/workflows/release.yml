name: Release Node.js Binary

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write
  id-token: write

jobs:
  build:
    name: Build ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-pc-windows-msvc
            os: windows-latest
          - target: aarch64-pc-windows-msvc
            os: windows-latest
          - target: x86_64-apple-darwin
            os: macos-latest
          - target: aarch64-apple-darwin
            os: macos-latest
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
            use_cross: false
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-latest
            use_cross: true
          - target: x86_64-unknown-linux-musl
            os: ubuntu-latest
            use_cross: true
          - target: aarch64-unknown-linux-musl
            os: ubuntu-latest
            use_cross: true

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20.x
          cache: yarn

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install cross toolchain
        if: runner.os == 'Linux' && matrix.use_cross == true
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-aarch64-linux-gnu qemu-user-static
          sudo docker pull messense/musl-cross:aarch64-musl
          cargo install cross --git https://github.com/cross-rs/cross

      - name: Install dependencies
        run: yarn install --frozen-lockfile

      # --- Build ---
      - name: Build via cross
        if: runner.os == 'Linux' && matrix.use_cross == true
        run: |
          cross build --release --target ${{ matrix.target }}
          npx napi build --platform --release --target ${{ matrix.target }}

      - name: Build native
        if: matrix.use_cross != true
        run: |
          yarn build --release --target ${{ matrix.target }}

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.target }}
          path: |
            index.node
            index.d.ts

  publish:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20.x
          cache: yarn
          registry-url: https://registry.npmjs.org

      - name: Install dependencies
        run: yarn install --frozen-lockfile

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Prepare publish assets
        run: |
          mkdir -p npm
          cp index.js package.json README.md npm/
          cp artifacts/index.d.ts npm/
          for target in $(cat napi.config.json | jq -r '.triples[]'); do
            mkdir -p npm/$target
            cp artifacts/$target/index.node npm/$target/
          done

      - name: Prepublish
        working-directory: ./npm
        run: npx napi prepublish -t npm

      - name: Publish to npm
        working-directory: ./npm
        run: yarn publish --access public --tag latest
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/**/*.node
