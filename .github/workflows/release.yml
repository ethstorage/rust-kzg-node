name: Release Node.js Binary

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write
  id-token: write

jobs:
  build:
    name: Build ${{ matrix.target }}
    runs-on: ${{ matrix.os }}

    strategy:
      fail-fast: false
      matrix:
        target:
          - x86_64-pc-windows-msvc
          - aarch64-pc-windows-msvc
          - x86_64-apple-darwin
          - aarch64-apple-darwin
          - x86_64-unknown-linux-gnu
          - aarch64-unknown-linux-gnu
          - x86_64-unknown-linux-musl
          - aarch64-unknown-linux-musl
        include:
          - target: x86_64-pc-windows-msvc
            os: windows-latest
          - target: x86_64-apple-darwin
            os: macos-latest
          - target: aarch64-apple-darwin
            os: macos-latest
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-latest
          - target: x86_64-unknown-linux-musl
            os: ubuntu-latest
          - target: aarch64-unknown-linux-musl
            os: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20.x
          cache: "yarn"

      - name: Install Rust Toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      # ----------------------------------------------------------------------
      # 🛠️ 关键修正：手动配置 Linux 交叉编译依赖和链接器
      # ----------------------------------------------------------------------
      - name: Install Linux dependencies and configure linker
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          
          # 1. 针对 MUSL 目标
          if [[ "${{ matrix.target }}" == *-musl ]]; then
            sudo apt-get install -y musl-tools
            # Napi-rs 环境变量
            echo "NAPI_RS_BUNDLED_MUSL=1" >> $GITHUB_ENV
          fi

          # 2. 针对 AARCH64-GNU 交叉编译
          if [[ "${{ matrix.target }}" == aarch64-unknown-linux-gnu ]]; then
            sudo apt-get install -y gcc-aarch64-linux-gnu
          
            # 配置 Cargo 链接器（这是解决挂起或失败的关键）
            mkdir -p ~/.cargo
            CARGO_CONFIG_PATH="$HOME/.cargo/config.toml"
          
            # 如果文件不存在则创建
            if [ ! -f "$CARGO_CONFIG_PATH" ]; then
              touch "$CARGO_CONFIG_PATH"
            fi
          
            # 写入配置
            echo '[target.aarch64-unknown-linux-gnu]' >> "$CARGO_CONFIG_PATH"
            echo 'linker = "aarch64-linux-gnu-gcc"' >> "$CARGO_CONFIG_PATH"
          fi
          
          # 3. Napi-rs 核心环境变量
          echo "NAPI_RS_NATIVE_NODE_MODULE=1" >> $GITHUB_ENV

      - name: Install dependencies
        run: yarn install --frozen-lockfile

      - name: Build ${{ matrix.target }}
        # Napi-rs 推荐直接使用 yarn build --release --target
        run: yarn build --release --target ${{ matrix.target }}

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.target }}
          path: |
            index.node
            index.d.ts

  publish:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20.x
          cache: "yarn"
          registry-url: https://registry.npmjs.org

      - name: Install dependencies
        run: yarn install --frozen-lockfile

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Prepare publish assets
        run: |
          mkdir -p npm
          cp index.js package.json README.md npm/
          cp artifacts/index.d.ts npm/
          
          if [ -f napi.config.json ]; then
            for target in $(cat napi.config.json | jq -r '.triples[]'); do
              mkdir -p npm/$target
              # 复制制品，注意这里的路径依赖于您的 napi 构建输出
              cp artifacts/$target/index.node npm/$target/
            done
          else
            echo "Warning: napi.config.json not found. Assuming standard structure."
          fi

      - name: Prepublish (NAPI-RS)
        working-directory: ./npm
        run: npx napi prepublish -t npm

      - name: Publish to npm
        working-directory: ./npm
        run: yarn publish --access public --tag latest
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/**/*.node
