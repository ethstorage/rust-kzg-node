name: Release Node.js Binary

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write
  id-token: write

jobs:
  build:
    name: Build ${{ matrix.target }}
    runs-on: ${{ matrix.os }}

    strategy:
      fail-fast: false
      matrix:
        target:
          - x86_64-pc-windows-msvc
          - aarch64-pc-windows-msvc
          - x86_64-apple-darwin
          - aarch64-apple-darwin
          - x86_64-unknown-linux-gnu
          - aarch64-unknown-linux-gnu
          - x86_64-unknown-linux-musl
          - aarch64-unknown-linux-musl
        include:
          - target: x86_64-pc-windows-msvc
            os: windows-latest
          - target: aarch64-pc-windows-msvc
            os: windows-latest
          - target: x86_64-apple-darwin
            os: macos-latest
          - target: aarch64-apple-darwin
            os: macos-latest
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-latest
          - target: x86_64-unknown-linux-musl
            os: ubuntu-latest
          - target: aarch64-unknown-linux-musl
            os: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20.x
          cache: "yarn"

      # ----------------------------------------------------------------------
      # 💻 Step 1: 为 Windows 和 macOS 安装 Rust Toolchain
      # Linux 目标将在 'cross-action' 内部处理 Rust Toolchain
      # ----------------------------------------------------------------------
      - name: Install Rust Toolchain (Non-Linux)
        if: runner.os != 'Linux'
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      # ----------------------------------------------------------------------
      # 🚀 Step 2: 构建 Linux 目标（使用 cross-rs/cross-action）
      # ----------------------------------------------------------------------
      - name: Build Linux Targets (using cross)
        if: runner.os == 'Linux'
        # 使用正确的 Action 名称和版本
        uses: cross-rs/cross-action@v1.0.0
        with:
          target: ${{ matrix.target }}
          # NAPI_RS_BUNDLED_MUSL 是编译 musl 目标的关键环境变量
          env: |
            NAPI_RS_BUNDLED_MUSL=1
          # command: 在 cross 容器内执行的命令
          command: |
            # 必须在 cross 容器内安装依赖
            yarn install --frozen-lockfile
            # 运行您的 napi-rs 构建命令
            yarn build --release --target ${{ matrix.target }}
          # 确保容器可以访问网络进行 yarn install
          docker-options: --network host

      # ----------------------------------------------------------------------
      # 💻 Step 3: 构建 Non-Linux 目标 (macOS 和 Windows)
      # ----------------------------------------------------------------------
      - name: Install dependencies (Non-Linux)
        if: runner.os != 'Linux'
        run: yarn install --frozen-lockfile

      - name: Build Non-Linux Targets
        if: runner.os != 'Linux'
        run: yarn build --release --target ${{ matrix.target }}

      # ----------------------------------------------------------------------
      # 📦 Step 4: 上传制品
      # ----------------------------------------------------------------------
      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.target }}
          # 假设 index.node 和 index.d.ts 在根目录或构建后被移动到根目录
          path: |
            index.node
            index.d.ts

  publish:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20.x
          cache: "yarn"
          registry-url: https://registry.npmjs.org

      - name: Install dependencies
        run: yarn install --frozen-lockfile

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Prepare publish assets
        run: |
          mkdir -p npm
          # 复制核心文件
          cp index.js package.json README.md npm/
          cp artifacts/index.d.ts npm/
          
          # 根据 napi.config.json 遍历目标，复制 .node 文件到对应目录
          if [ -f napi.config.json ]; then
            for target in $(cat napi.config.json | jq -r '.triples[]'); do
              mkdir -p npm/$target
              cp artifacts/$target/index.node npm/$target/
            done
          else
            echo "Warning: napi.config.json not found. Assuming standard structure."
          fi

      - name: Prepublish (NAPI-RS)
        working-directory: ./npm
        run: npx napi prepublish -t npm

      - name: Publish to npm
        working-directory: ./npm
        run: yarn publish --access public --tag latest
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/**/*.node
