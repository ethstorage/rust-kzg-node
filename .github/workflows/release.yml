name: Release Node.js Binary

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write
  id-token: write

jobs:
  build:
    name: Build ${{ matrix.target }}
    runs-on: ${{ matrix.os }}

    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-apple-darwin
            os: macos-latest

          - target: aarch64-apple-darwin
            os: macos-latest

          - target: x86_64-pc-windows-msvc
            os: windows-latest

          - target: aarch64-pc-windows-msvc
            os: windows-latest

          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest

          - target: aarch64-unknown-linux-gnu
            os: ubuntu-latest
            linux_arm: true

          - target: x86_64-unknown-linux-musl
            os: ubuntu-latest
            linux_arm: true

          - target: aarch64-unknown-linux-musl
            os: ubuntu-latest
            linux_arm: true

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20.x

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      # ========== ONLY FOR LINUX ARM/MUSL ==========
      - name: Install Zig (only for ARM/musl build)
        if: matrix.linux_arm == true
        run: |
          sudo snap install zig --classic

      - name: Configure zig CC (only for ARM/musl)
        if: matrix.linux_arm == true
        run: |
          # zig 可以自动选择 musl or gnu
          echo "CC=${{ matrix.target }}=zig cc -target ${{ matrix.target }}" >> $GITHUB_ENV
          echo "CXX=${{ matrix.target }}=zig c++ -target ${{ matrix.target }}" >> $GITHUB_ENV

      - name: Install dependencies
        run: yarn install --frozen-lockfile

      # ========== Build ==========
      - name: Build napi
        run: npx napi build --platform --release --target ${{ matrix.target }}

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.target }}
          path: ./**/*.node

  publish:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20.x
          cache: yarn
          registry-url: https://registry.npmjs.org

      - name: Install dependencies
        run: yarn install --frozen-lockfile

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Prepare publish assets
        run: |
          mkdir -p npm
          cp index.js package.json README.md npm/
          cp artifacts/index.d.ts npm/
          for target in $(cat napi.config.json | jq -r '.triples[]'); do
            mkdir -p npm/$target
            cp artifacts/$target/index.node npm/$target/
          done

      - name: Prepublish
        working-directory: ./npm
        run: npx napi prepublish -t npm

      - name: Publish to npm
        working-directory: ./npm
        run: yarn publish --access public --tag latest
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/**/*.node
